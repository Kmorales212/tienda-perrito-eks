apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-db
  namespace: tienda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tienda-db
  template:
    metadata:
      labels:
        app: tienda-db
      annotations:
        # AQUÍ ESTÁ LA CLAVE: Deshabilitar la inyección automática
        instrumentation.opentelemetry.io/inject: "false"
    spec:
      containers:
        - name: mysql
          image: 514567385064.dkr.ecr.us-east-1.amazonaws.com/tienda-db2:eks-v1
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}